version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: reqres
      POSTGRES_PASSWORD: reqres_secret
      POSTGRES_DB: reqres_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reqres -d reqres_test"]
      interval: 5s
      timeout: 5s
      retries: 5
